<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NaijaRec ColdStart</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel input-panel">
        <div class="brand-row">
          <div class="mark" aria-hidden="true">N</div>
          <div>
            <h1>NaijaRec_ColdStart</h1>
            <p>Persona-aware recommendations for restaurants and grocery products.</p>
          </div>
        </div>

        <label for="persona">User persona</label>
        <textarea id="persona" rows="8">A Nigerian student in Philadelphia who likes spicy jollof, halal meat, generous portions, affordable food, and warm service for group dinners.</textarea>

        <div class="control-grid">
          <div>
            <label for="domain">Domain</label>
            <select id="domain">
              <option value="restaurants">Restaurants</option>
              <option value="amazon_grocery">Amazon Grocery</option>
              <option value="amazon_grocery_dense">Amazon Grocery Dense</option>
            </select>
          </div>

          <div>
            <label for="city">City</label>
            <select id="city">
              <option value="Philadelphia">Philadelphia</option>
              <option value="Tampa">Tampa</option>
              <option value="Nashville">Nashville</option>
              <option value="">Any city</option>
            </select>
          </div>

          <div>
            <label for="topK">Top K</label>
            <input id="topK" type="number" min="1" max="20" value="5" />
          </div>
        </div>

        <div class="actions">
          <button id="recommendBtn" type="button">Recommend</button>
          <button id="sampleRestaurant" class="secondary" type="button">Restaurant Sample</button>
          <button id="sampleGrocery" class="secondary" type="button">Grocery Sample</button>
        </div>
      </section>

      <section class="panel output-panel">
        <div class="result-head">
          <div>
            <h2>Recommendations</h2>
            <p id="status">Ready</p>
          </div>
          <a href="/docs" target="_blank" rel="noreferrer">API docs</a>
        </div>

        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
